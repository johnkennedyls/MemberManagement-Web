server.address=0.0.0.0
server.port=8080
server.servlet.context-path=/api/v1

# Conexión directa a Oracle
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:ORCL
spring.datasource.username=member_admin
spring.datasource.password=SecurePassword123!
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# Logging
logging.level.com.fup.membermanagement.backend_api=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG

# Hugging Face Integration
hf.api.key=${HF_API_KEY:}
hf.model.url=${HF_MODEL_URL:https://api-inference.huggingface.co/models/autonlab/TabTransformer}

# WebClient timeout settings
spring.web.reactive.timeout=30s